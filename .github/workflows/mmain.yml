me: Backend Test 
on: 
  push:    
    branches: [main]
  pull_request:
jobs:
  tests: 
    runs-on: ubuntu-22.04 
    steps:
      - name: setup 
        uses: actions/checkout@v4 
      - name: Node setup 
        uses: actions/setup-node@v4 
        with: 
          node-version: 24.x
      - name: install dependencies
        run: npm ci
      - name: Run All tests 
        run: npm run test
