name: my_first_ci
on: 
  push:
      branches: [main]
jobs:
  ci_job:
    runs-on: ubuntu-latest
    defaults:
          run:
            working-directory: server


        steps:
          - name: load virtual machine
            uses: actions/checkout@v4
            
          - name:  setuo node env
            uses: actions/setup-node@v4

          - name: Install dependency
            run: npm install
            
          - name: Run index file
            run: node index.js
